<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport: notch-safe, no user zoom ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── SEO & description ── -->
    <meta name="description" content="AURA Pets — Gestión premium del expediente médico y sanitario de mascotas. Pasaporte sanitario global, modo SOS, cifrado AES-256." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Rodigital Advance" />

    <!-- ── PWA / installable ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AURA Pets Global" />

    <!-- ── iOS Safari PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AURA Pets Global" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- ── Theme color (Android Chrome status bar) ── -->
    <meta name="theme-color" content="#0A0F1E" />
    <meta name="msapplication-TileColor" content="#0A0F1E" />

    <!-- ── Open Graph (social sharing) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AURA Pets Global | Excelencia Sanitaria Global" />
    <meta property="og:description" content="Gestión premium del expediente médico y sanitario de mascotas. Pasaporte sanitario global, SOS, cifrado AES-256." />
    <meta property="og:image" content="/favicon.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AURA Pets Global" />
    <meta name="twitter:description" content="Pasaporte sanitario global para mascotas. Cifrado AES-256. GDPR/LOPD." />

    <!-- ── Icons ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>AURA Pets Global | Excelencia Sanitaria Global</title>

    <!-- Premium Serif and Sans Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --aura-black: #000000;
        --aura-gold: #D4AF37;
      }

      body, html {
        margin: 0;
        padding: 0;
        background: var(--aura-black);
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      #splash-screen {
        position: fixed;
        inset: 0;
        background: var(--aura-black);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
      }

      .aura-logo-container {
        position: relative;
        width: 220px;
        height: 220px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .aura-logo-splash {
        width: 100%;
        filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
        animation: auraPulse 4s ease-in-out infinite;
        z-index: 2;
      }

      .aura-glow {
        position: absolute;
        width: 150%;
        height: 150%;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
        animation: rotateGlow 10s linear infinite;
        z-index: 1;
      }

      @keyframes auraPulse {
        0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
        50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5)); }
      }

      @keyframes rotateGlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .loading-bar-container {
        width: 180px;
        height: 1px;
        background: rgba(212, 175, 55, 0.1);
        margin-top: 3rem;
        position: relative;
        overflow: hidden;
      }

      .loading-bar {
        position: absolute;
        width: 30%;
        height: 100%;
        background: var(--aura-gold);
        box-shadow: 0 0 10px var(--aura-gold);
        animation: loadingSlide 2s ease-in-out infinite;
      }

      @keyframes loadingSlide {
        from { left: -30%; }
        to { left: 130%; }
      }

      .splash-legal {
        position: absolute;
        bottom: 3rem;
        color: rgba(212, 175, 55, 0.4);
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>

    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
