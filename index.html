<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Rodigitaladvance/mascotas/main/public/Brand/aura-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA Pets | Global Luxury Animal Health</title>
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* Integrated Splash Screen */
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s ease, visibility 0.8s;
      }

      .aura-logo-splash {
        width: 180px;
        filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        content: url("https://raw.githubusercontent.com/Rodigitaladvance/mascotas/main/public/Brand/aura-logo.png");
        animation: auraPulse 3s ease-in-out infinite;
      }

      @keyframes auraPulse {
        0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
        50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.6)); }
      }

      .splash-loading-text {
        color: #D4AF37;
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 5px;
        margin-top: 2rem;
        font-weight: 300;
        text-transform: uppercase;
        opacity: 0.6;
      }

      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <img src="/brand/aura-logo.png" alt="AURA Logo" class="aura-logo-splash">
      <div class="splash-loading-text">Authenticating Vault</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Automatically hide splash after a minimum duration or when React is ready
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
        }, 1500);
      });
    </script>
  </body>
</html>
