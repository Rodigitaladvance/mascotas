    <style>
      :root {
        --aura-black: #000000;
        --aura-gold: #D4AF37;
      }

      body, html {
        margin: 0;
        padding: 0;
        background: var(--aura-black);
        height: 100%;
        overflow: hidden;
      }

      #splash-screen {
        position: fixed;
        inset: 0;
        background: var(--aura-black);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
      }

      .aura-logo-container {
        position: relative;
        width: 220px;
        height: 220px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .aura-logo-splash {
        width: 100%;
        filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
        animation: auraPulse 4s ease-in-out infinite;
        z-index: 2;
      }

      .aura-glow {
        position: absolute;
        width: 150%;
        height: 150%;
        background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
        animation: rotateGlow 10s linear infinite;
        z-index: 1;
      }

      @keyframes auraPulse {
        0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
        50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5)); }
      }

      @keyframes rotateGlow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .loading-bar-container {
        width: 180px;
        height: 1px;
        background: rgba(212, 175, 55, 0.1);
        margin-top: 3rem;
        position: relative;
        overflow: hidden;
      }

      .loading-bar {
        position: absolute;
        width: 30%;
        height: 100%;
        background: var(--aura-gold);
        box-shadow: 0 0 10px var(--aura-gold);
        animation: loadingSlide 2s ease-in-out infinite;
      }

      @keyframes loadingSlide {
        from { left: -30%; }
        to { left: 130%; }
      }

      .splash-legal {
        position: absolute;
        bottom: 3rem;
        color: rgba(212, 175, 55, 0.4);
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
